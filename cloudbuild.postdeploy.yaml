# Cloud Build configuration for post-deployment E2E smoke tests
# This configuration is separate from the main build and is intended to be
# triggered after Firebase App Hosting completes its deployment.
#
# Usage:
# 1. Save this as a separate Cloud Build configuration
# 2. Create a Cloud Build trigger that runs this after apphosting deployment
# 3. Pass the deployed service URL as a substitution variable
#
# Example trigger:
# - Name: certifai-app-e2e-postdeploy
# - Source: GitHub repository
# - Branch: ^master$
# - Build configuration: Cloud Build YAML file
# - Substitutions:
#   - _SERVICE_URL: https://certestic.com (for prod)
#   - _DEPLOYMENT_ENV: prod
#   - _PROJECT_ID: certifai-prod

steps:
  # Step 1: Install dependencies
  - name: 'node:24'
    entrypoint: npm
    args: ['ci']
    id: 'install-dependencies'

  # Step 2: Install Playwright browsers
  - name: 'node:24'
    entrypoint: npm
    args: ['run', 'playwright', 'install', '--with-deps', 'chromium']
    id: 'install-playwright'
    waitFor: ['install-dependencies']

  # Step 3: Wait for service to be ready
  - name: 'node:24'
    entrypoint: bash
    args: ['scripts/wait-for-service.sh', '${_SERVICE_URL}', '60', '10']
    id: 'wait-for-service'
    waitFor: ['install-playwright']
    env:
      - 'CI=true'

  # Step 4: Run post-deployment E2E smoke tests
  - name: 'node:24'
    entrypoint: bash
    args: ['scripts/e2e-post-deployment.sh']
    id: 'run-postdeploy-tests'
    waitFor: ['wait-for-service']
    env:
      - 'CI=true'
      - 'NODE_ENV=${_DEPLOYMENT_ENV}'
      - 'DEPLOYMENT_ENV=${_DEPLOYMENT_ENV}'
      - 'PLAYWRIGHT_TEST_BASEURL=${_SERVICE_URL}'
      - 'PW_TEST_EMAIL=${PW_TEST_EMAIL}'
      - 'PW_TEST_PASSWORD=${PW_TEST_PASSWORD}'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}'

# Build timeout for post-deployment tests
timeout: '1800s'

# Substitutions - these should be passed by the trigger or set in Cloud Build
substitutions:
  _SERVICE_URL: 'https://certestic.com'  # URL of the deployed service
  _DEPLOYMENT_ENV: 'prod'                 # Environment: prod or uat
  _PROJECT_ID: 'certifai-prod'            # GCP project ID

# Fetch secrets from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_NUMBER/secrets/PW_TEST_EMAIL/versions/latest
      env: 'PW_TEST_EMAIL'
    - versionName: projects/$PROJECT_NUMBER/secrets/PW_TEST_PASSWORD/versions/latest
      env: 'PW_TEST_PASSWORD'
    - versionName: projects/$PROJECT_NUMBER/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: 'NEXT_PUBLIC_FIREBASE_API_KEY'
    - versionName: projects/$PROJECT_NUMBER/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
    - versionName: projects/$PROJECT_NUMBER/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: 'NEXT_PUBLIC_FIREBASE_PROJECT_ID'

options:
  machineType: 'N1_HIGHCPU_8'  # Use high CPU for faster test execution
  logging: CLOUD_LOGGING_ONLY
